##############################################################################
# Edmonton 3D Viewer — Conversion Services
#
# Two sidecar services:
#   1. blender-converter  (Linux)  — OBJ/FBX/STL/DAE → GLB via Blender
#   2. skp-converter      (Linux)  — SKP → GLB via Wine+SketchUp8+Blender
#
# Usage:
#   docker compose build
#   docker compose up -d
#
# Then expose via Cloudflare Tunnel:
#   cloudflared tunnel --url http://localhost:5000
#
# The Nginx reverse proxy routes:
#   POST /convert     → blender-converter:5000  (existing OBJ/FBX/STL service)
#   POST /convert/skp → skp-converter:5001      (new SKP service)
#   GET  /health      → both services aggregated
##############################################################################

services:

  # ── Blender conversion service (OBJ/FBX/STL/DAE/PLY/USD → GLB) ──────────
  blender-converter:
    build:
      context: ./blender-converter
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── SKP conversion service (SKP → DAE → GLB) ────────────────────────────
  skp-converter:
    build:
      context: ./skp-converter
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:5001:5001"
    environment:
      - PYTHONUNBUFFERED=1
      - WINEDEBUG=-all
    restart: unless-stopped
    # SKP converter is heavier — give it more resources
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Nginx reverse proxy (unified API on port 5050) ──────────────────────
  gateway:
    image: nginx:alpine
    ports:
      - "127.0.0.1:5050:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - blender-converter
      - skp-converter
    restart: unless-stopped
