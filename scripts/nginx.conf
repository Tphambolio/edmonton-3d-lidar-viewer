# Unified API gateway for conversion services
#
# Routes:
#   POST /convert      → Blender service (OBJ/FBX/STL → GLB)
#   POST /convert/skp  → SKP service (SKP → GLB)
#   GET  /health       → Blender service health
#   GET  /health/skp   → SKP service health

upstream blender {
    server blender-converter:5000;
}

upstream skp {
    server skp-converter:5001;
}

server {
    listen 80;
    server_name _;

    # Generous limits for 3D model uploads
    client_max_body_size 100m;

    # Generous timeout for conversions (SketchUp under Wine is slow)
    proxy_read_timeout 300s;
    proxy_send_timeout 60s;
    proxy_connect_timeout 10s;

    # SKP conversion (must come before /convert to match first)
    location /convert/skp {
        proxy_pass http://skp/convert/skp;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Blender conversion (OBJ, FBX, STL, DAE, etc.)
    location /convert {
        proxy_pass http://blender/convert;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health checks
    location /health {
        proxy_pass http://blender/health;
        proxy_set_header Host $host;
    }

    location /health/skp {
        proxy_pass http://skp/health;
        proxy_set_header Host $host;
    }
}
